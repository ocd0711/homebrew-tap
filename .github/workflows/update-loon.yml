name: Update Loon cask

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update cask from latest release
        run: |
          ruby <<'RUBY'
          require "json"
          require "net/http"
          require "uri"

          uri = URI("https://api.github.com/repos/Loon0x00/Loon4Mac/releases/latest")
          request = Net::HTTP::Get.new(uri)
          request["Accept"] = "application/vnd.github+json"
          request["X-GitHub-Api-Version"] = "2022-11-28"
          request["Authorization"] = "Bearer #{ENV.fetch("GITHUB_TOKEN")}" if ENV["GITHUB_TOKEN"]

          response = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) do |http|
            http.request(request)
          end

          abort "GitHub API returned #{response.code}: #{response.body}" unless response.is_a?(Net::HTTPSuccess)

          release = JSON.parse(response.body)
          match = release.fetch("tag_name").match(/\Av?(\d+(?:\.\d+)*)\((\d+)\)\z/)
          abort "Unsupported release tag: #{release.fetch("tag_name")}" unless match

          app_version = match[1]
          build = match[2]
          asset_name = "Loon-#{app_version}-beta-#{build}.dmg"
          asset = release.fetch("assets").find { |item| item["name"] == asset_name }
          abort "Release asset not found: #{asset_name}" unless asset

          digest = asset["digest"].to_s
          abort "Release asset has no sha256 digest: #{asset_name}" unless digest.start_with?("sha256:")

          cask_path = "Casks/loon.rb"
          cask = File.read(cask_path)
          cask.sub!(/version "[^"]+"/, %(version "#{app_version},#{build}"))
          cask.sub!(/sha256 "[^"]+"/, %(sha256 "#{digest.delete_prefix("sha256:")}"))
          File.write(cask_path, cask)
          RUBY
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet -- Casks/loon.rb; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        run: |
          version=$(ruby -ne 'puts $1 if /^  version "([^"]+)"/ =~ $_' Casks/loon.rb)
          branch="update-loon-${version//,/-}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add Casks/loon.rb
          git commit -m "Update Loon to ${version}"
          git push --force-with-lease origin "$branch"

          existing_pr=$(gh pr list --head "$branch" --state open --json number --jq '.[0].number')
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --title "Update Loon to ${version}" \
              --body "Automated update from Loon4Mac latest release."
          else
            gh pr create \
              --title "Update Loon to ${version}" \
              --body "Automated update from Loon4Mac latest release." \
              --base "$GITHUB_REF_NAME" \
              --head "$branch"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
